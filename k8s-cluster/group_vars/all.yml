---
# Multipass VM settings
cluster_name: k8s
num_workers: 1
node_cpu: 2
node_memory: 2G
node_disk: 20G
ubuntu_version: "22.04"

# SSH key paths (used for cloud-init injection and Ansible SSH)
ssh_public_key_path: "~/.ssh/id_ed25519.pub"
ssh_private_key_path: "~/.ssh/id_ed25519"

# Kubernetes
k8s_version: "1.33"
pod_cidr: "192.168.0.0/16"

# CNI
calico_version: "3.29.0"

# Container runtime
containerd_version: "2.2.3"
runc_version: "1.2.6"
cni_plugins_version: "1.6.2"
