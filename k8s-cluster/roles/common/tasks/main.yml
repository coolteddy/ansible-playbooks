---
- name: Disable swap
  command: swapoff -a
  changed_when: false

- name: Remove swap from fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '#\1'

- name: Write kernel modules config
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Load overlay module
  community.general.modprobe:
    name: overlay

- name: Load br_netfilter module
  community.general.modprobe:
    name: br_netfilter

- name: Set sysctl networking params
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop:
    - { name: net.bridge.bridge-nf-call-iptables,  value: "1" }
    - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { name: net.ipv4.ip_forward,                 value: "1" }

- name: Install apt prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
    update_cache: true

- name: Download containerd binary
  get_url:
    url: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-amd64.tar.gz"
    dest: /tmp/containerd.tar.gz

- name: Extract containerd to /usr/local
  unarchive:
    src: /tmp/containerd.tar.gz
    dest: /usr/local
    remote_src: true

- name: Download containerd systemd service
  get_url:
    url: "https://raw.githubusercontent.com/containerd/containerd/main/containerd.service"
    dest: /etc/systemd/system/containerd.service

- name: Enable and start containerd
  systemd:
    name: containerd
    enabled: true
    state: started
    daemon_reload: true

- name: Download runc
  get_url:
    url: "https://github.com/opencontainers/runc/releases/download/v{{ runc_version }}/runc.amd64"
    dest: /tmp/runc.amd64
    mode: "0755"

- name: Install runc
  command: install -m 755 /tmp/runc.amd64 /usr/local/sbin/runc
  args:
    creates: /usr/local/sbin/runc

- name: Create CNI bin directory
  file:
    path: /opt/cni/bin
    state: directory
    mode: "0755"

- name: Download CNI plugins
  get_url:
    url: "https://github.com/containernetworking/plugins/releases/download/v{{ cni_plugins_version }}/cni-plugins-linux-amd64-v{{ cni_plugins_version }}.tgz"
    dest: /tmp/cni-plugins.tgz

- name: Extract CNI plugins
  unarchive:
    src: /tmp/cni-plugins.tgz
    dest: /opt/cni/bin
    remote_src: true

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate containerd config with SystemdCgroup enabled
  shell: containerd config default | sed 's/SystemdCgroup = false/SystemdCgroup = true/'
  register: containerd_config_output
  changed_when: false

- name: Write containerd config
  copy:
    content: "{{ containerd_config_output.stdout }}"
    dest: /etc/containerd/config.toml
  notify: Restart containerd

- name: Flush handlers to apply containerd config now
  meta: flush_handlers

- name: Create Kubernetes apt keyring directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Kubernetes apt GPG key
  shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key | \
    gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes apt repository
  copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /\n"

- name: Install kubeadm, kubelet, kubectl
  apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    update_cache: true

- name: Hold Kubernetes packages at current version
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Enable kubelet
  systemd:
    name: kubelet
    enabled: true
